name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Feedback.slnx

      - name: Build
        run: dotnet build Feedback.slnx --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/Feedback.Api.Tests/Feedback.Api.Tests.csproj --no-restore --configuration Release --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/Feedback.Api.Tests.Integration/Feedback.Api.Tests.Integration.csproj --no-restore --configuration Release --verbosity normal
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Database Tests
        run: dotnet test tests/Feedback.Api.Tests.Database/Feedback.Api.Tests.Database.csproj --no-restore --configuration Release --verbosity normal
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: false
